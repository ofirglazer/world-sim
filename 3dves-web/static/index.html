<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3DVES — Live Simulation</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-world:      #f0f0e8;
      --bg-c4i:        #0a0a1a;
      --bg-panel:      rgba(10, 10, 26, 0.88);
      --bg-hud:        rgba(10, 10, 26, 0.72);
      --col-accent:    #00e5ff;
      --col-warn:      #ffea00;
      --col-danger:    #ff1744;
      --col-ok:        #00e676;
      --col-text:      #e0e0e0;
      --col-muted:     #888;
      --col-border:    rgba(255,255,255,0.12);
      --font-mono:     "JetBrains Mono", "Fira Code", "Consolas", monospace;
      --font-ui:       "Inter", "Segoe UI", system-ui, sans-serif;
      --radius:        6px;
      --panel-w:       280px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-c4i);
      font-family: var(--font-ui);
      color: var(--col-text);
      user-select: none;
    }

    /* ── Canvas fills viewport ────────────────────────────────── */
    #sim-canvas {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
      cursor: crosshair;
    }

    /* ── HUD — top-left ───────────────────────────────────────── */
    #hud {
      position: absolute; top: 12px; left: 12px;
      background: var(--bg-hud);
      border: 1px solid var(--col-border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      min-width: 200px;
    }
    #hud .row { display: flex; justify-content: space-between; gap: 16px; }
    #hud .label { color: var(--col-muted); }
    #hud .val   { color: var(--col-accent); font-weight: 600; }
    #hud .val.warn   { color: var(--col-warn); }
    #hud .val.danger { color: var(--col-danger); }
    #hud .val.ok     { color: var(--col-ok); }

    /* connection dot */
    #conn-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--col-danger);
      margin-right: 6px;
      vertical-align: middle;
    }
    #conn-dot.connected { background: var(--col-ok); }

    /* ── Controls — top-right ─────────────────────────────────── */
    #controls {
      position: absolute; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      align-items: flex-end;
    }
    button {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--col-border);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.15); }
    button:active { filter: brightness(0.9); }

    #btn-new    { background: var(--col-accent);  color: #000; }
    #btn-pause  { background: var(--col-warn);    color: #000; }
    #btn-view   { background: #333;               color: var(--col-text); }
    #btn-reset  { background: #333;               color: var(--col-text); }

    /* ── Filter checkboxes ─────────────────────────────────────── */
    #filters {
      position: absolute; bottom: 12px; right: 12px;
      background: var(--bg-hud);
      border: 1px solid var(--col-border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      display: flex; flex-direction: column; gap: 5px;
    }
    #filters label {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    #filters input[type=checkbox] { accent-color: var(--col-accent); }

    /* ── Inspection panel ─────────────────────────────────────── */
    #panel {
      position: absolute; top: 50%; left: 12px;
      transform: translateY(-50%);
      width: var(--panel-w);
      background: var(--bg-panel);
      border: 1px solid var(--col-border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 12px;
      line-height: 1.9;
      display: none;
    }
    #panel.visible { display: block; }
    #panel h3 {
      font-size: 13px; color: var(--col-accent);
      margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #panel-close {
      cursor: pointer; color: var(--col-muted);
      font-size: 16px; line-height: 1;
    }
    #panel-close:hover { color: var(--col-danger); }
    #panel .prow { display: flex; justify-content: space-between; gap: 8px; }
    #panel .pk   { color: var(--col-muted); }
    #panel .pv   { color: var(--col-text); font-family: var(--font-mono); }
    #panel .pv.eoi     { color: var(--col-warn); font-weight: 700; }
    #panel .pv.det     { color: var(--col-ok); }
    #panel .pv.lf      { color: var(--col-danger); font-weight: 700; }
    #panel .section-hdr{
      color: var(--col-muted); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; margin: 8px 0 4px;
      border-top: 1px solid var(--col-border); padding-top: 6px;
    }

    /* ── Keyboard hint — bottom-left ───────────────────────────── */
    #keyhint {
      position: absolute; bottom: 12px; left: 12px;
      background: var(--bg-hud);
      border: 1px solid var(--col-border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 10px;
      color: var(--col-muted);
      pointer-events: none;
      line-height: 1.7;
    }
    #keyhint kbd {
      background: rgba(255,255,255,0.1);
      border-radius: 3px; padding: 1px 5px;
      color: var(--col-text); font-family: var(--font-mono);
    }

    /* ── Paused overlay ─────────────────────────────────────────── */
    #paused-banner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(255,234,0,0.15);
      border: 2px solid var(--col-warn);
      border-radius: var(--radius);
      padding: 12px 32px;
      font-size: 18px; font-weight: 700;
      color: var(--col-warn);
      letter-spacing: 0.1em;
      pointer-events: none;
      display: none;
    }
    #paused-banner.visible { display: block; }
  </style>
</head>
<body>

  <canvas id="sim-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="row">
      <span class="label"><span id="conn-dot"></span>Status</span>
      <span class="val" id="hud-status">Disconnected</span>
    </div>
    <div class="row">
      <span class="label">Sim time</span>
      <span class="val" id="hud-time">--:--</span>
    </div>
    <div class="row">
      <span class="label">Step</span>
      <span class="val" id="hud-step">0</span>
    </div>
    <div class="row">
      <span class="label">Alive</span>
      <span class="val" id="hud-alive">0</span>
    </div>
    <div class="row">
      <span class="label">Tracks</span>
      <span class="val" id="hud-tracks">0</span>
    </div>
    <div class="row">
      <span class="label">Clients</span>
      <span class="val" id="hud-clients">1</span>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="btn-new">▶ New Scenario</button>
    <button id="btn-pause" disabled>⏸ Pause</button>
    <button id="btn-view">🌍 World View</button>
    <button id="btn-reset">⌂ Reset View</button>
  </div>

  <!-- Entity filters -->
  <div id="filters">
    <div style="color:var(--col-muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Show</div>
    <label><input type="checkbox" id="f-uav"    checked> UAV</label>
    <label><input type="checkbox" id="f-wheeled" checked> Wheeled</label>
    <label><input type="checkbox" id="f-tracked" checked> Tracked</label>
    <label><input type="checkbox" id="f-ped"    checked> Pedestrian</label>
    <label><input type="checkbox" id="f-tracks" checked> Tracks</label>
    <label><input type="checkbox" id="f-fov"    checked> FOV cones</label>
    <label><input type="checkbox" id="f-roads"  checked> Roads</label>
  </div>

  <!-- Inspection panel -->
  <div id="panel">
    <h3><span id="panel-title">Entity</span><span id="panel-close">✕</span></h3>
    <div id="panel-body"></div>
  </div>

  <!-- Paused overlay -->
  <div id="paused-banner">⏸ PAUSED</div>

  <!-- Keyboard hints -->
  <div id="keyhint">
    <kbd>Space</kbd> pause/resume &nbsp;
    <kbd>R</kbd> reset view &nbsp;
    <kbd>V</kbd> toggle view<br>
    <kbd>Esc</kbd> deselect &nbsp;
    Scroll to zoom &nbsp; Right-drag to pan
  </div>

  <script type="module" src="renderer.js"></script>
  <script type="module" src="client.js"></script>
</body>
</html>
