[pytest]
# Authoritative pytest configuration for 3DVES.
#
# Why this file exists
# --------------------
# test_m1.py uses @pytest.fixture and pytest.approx (pytest-native style).
# All other test files use unittest.TestCase subclasses.  pytest collects
# and runs both styles transparently; `python -m unittest discover` would
# silently miss all pytest-fixture-based tests in test_m1.py.
#
# PyCharm compatibility notes
# ---------------------------
# - No `filterwarnings = error` here.  That setting promotes every Python
#   warning to a test-failing exception.  Tests pass in PyCharm's native
#   runner (which ignores warnings) but fail under pytest with that setting
#   active.  Warnings are instead fixed at source (Logger lazy-open fix).
#
# - No `-q` in addopts.  PyCharm's test runner parses pytest output to map
#   results back to individual tests.  The quiet format (-q) suppresses
#   per-test lines, causing PyCharm to show all tests as failed even when
#   they pass.  Verbosity is controlled per-run on the command line instead.
#
# - asyncio_mode = auto  enables pytest-asyncio for test_web.py without
#   requiring a @pytest.mark.asyncio decorator on every async test.
#   This setting has no effect on unittest.TestCase subclasses.
#
# Usage
# -----
#   pytest              -- run all tests (normal output)
#   pytest -v           -- verbose output with requirement IDs
#   pytest tests/test_web.py   -- single file
#   pytest --tb=short   -- compact tracebacks

testpaths = tests
asyncio_mode = auto

python_files   = test_*.py
python_classes = Test*
python_functions = test_*

filterwarnings =
    ignore::DeprecationWarning:sim3dves.core.engine
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning
