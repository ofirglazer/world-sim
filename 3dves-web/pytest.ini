[pytest]
# BUG-014 fix: pytest is the authoritative test runner for this project.
#
# test_m1.py uses @pytest.fixture and pytest.approx (pytest-native style).
# test_m2.py, test_m3.py, test_m4.py, test_m5.py, test_runner.py use
# unittest.TestCase subclasses.  pytest collects and runs both styles
# transparently; `python -m unittest discover` would silently miss all
# pytest-fixture-based tests in test_m1.py.
#
# asyncio_mode = "auto" enables pytest-asyncio for test_web.py without
# requiring a @pytest.mark.asyncio decorator on every async test.
#
# Usage:
#   pytest              -- run all tests
#   pytest -v           -- verbose output with requirement IDs in docstrings
#   pytest tests/test_web.py -v  -- run web tests only
#   pytest --tb=short   -- compact traceback on failure

;testpaths = tests
;asyncio_mode = auto
;addopts =
;    --tb=short
;    -q
;python_files = test_*.py
;python_classes = Test*
;python_functions = test_*
;
;filterwarnings =
;    error
;    ignore::DeprecationWarning:sim3dves.core.engine
;    ignore::pytest.PytestUnraisableExceptionWarning
;    ignore::ResourceWarning
